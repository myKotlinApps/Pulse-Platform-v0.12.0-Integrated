name: Android APK Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build ${{ matrix.label }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Legacy-GooglePlay
            task: assembleLegacyGooglePlayDebug
          - label: Legacy-CafeBazaar
            task: assembleLegacyCafebazaarDebug
          - label: Legacy-Myket
            task: assembleLegacyMyketDebug
          - label: Modern-GooglePlay
            task: assembleModernGooglePlayDebug
          - label: Modern-CafeBazaar
            task: assembleModernCafebazaarDebug
          - label: Modern-Myket
            task: assembleModernMyketDebug

    steps:
      - name: Checkout source
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        shell: bash
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0"

      - name: Make Gradle wrapper executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build APK
        working-directory: android
        run: ./gradlew --stacktrace --no-daemon ${{ matrix.task }}

      - name: Collect APK and checksum
        shell: bash
        run: |
          mkdir -p dist/${{ matrix.label }}
          find android/app/build/outputs/apk -type f -name '*.apk' -exec cp {} dist/${{ matrix.label }}/ \;
          test -n "$(find dist/${{ matrix.label }} -type f -name '*.apk' -print -quit)"
          cd dist/${{ matrix.label }}
          sha256sum *.apk > SHA256SUMS.txt

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ECU-Pulse-${{ matrix.label }}-Debug-APK
          path: dist/${{ matrix.label }}/
          if-no-files-found: error
          retention-days: 30
