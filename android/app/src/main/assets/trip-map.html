<!doctype html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>
html,body{height:100%;margin:0;background:#07111f;color:#fff;font-family:Tahoma,sans-serif;overflow:hidden}.map{height:calc(100% - 132px);position:relative}.map svg{width:100%;height:100%;display:block}.roads path{fill:none;stroke:#29445c;stroke-width:14;stroke-linecap:round}.labels{fill:#8ba0b5;font-size:17px}.route{fill:none;stroke:#2c7186;stroke-width:10;stroke-linecap:round;stroke-linejoin:round}.trail{fill:none;stroke:#55dff6;stroke-width:7;stroke-linecap:round;stroke-linejoin:round}.bar{height:132px;padding:8px;box-sizing:border-box;background:#0e2135;display:grid;gap:7px}.row{display:flex;gap:6px}.row button{flex:1;min-height:36px;background:#12304a;color:#dff8ff;border:1px solid #28506b;border-radius:10px;padding:7px}.row button.active{border-color:#55dff6;color:#55dff6}.info{font-size:12px;color:#c4d0da;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}input{width:100%}#car{will-change:transform}#car image{filter:drop-shadow(0 7px 8px rgba(0,0,0,.45))}</style></head><body>
<div class="map"><svg id="mapSvg" viewBox="-35 -35 1070 690" preserveAspectRatio="xMidYMid meet"><rect x="-35" y="-35" width="1070" height="690" fill="#081727"/><g class="roads"><path d="M70 480 C240 470 380 450 520 420 S790 370 930 350"/><path d="M150 560 C270 450 350 360 460 300 S700 190 860 120"/><path d="M80 310 C270 310 390 325 560 300 S800 250 950 245"/><path d="M470 560 C500 450 520 330 550 210 S580 90 610 35"/><path d="M690 560 C680 450 700 320 740 200 S790 100 830 35"/></g><g class="labels"><text x="75" y="510">آزادی</text><text x="780" y="390">تهرانپارس</text><text x="710" y="95">شمال تهران</text><text x="455" y="345">مرکز</text></g><polyline id="route" class="route"/><polyline id="trail" class="trail"/><g id="stops"></g><g id="car" transform="translate(70 480) rotate(0)"><image href="icons/trip-car-top.png" x="-31" y="-31" width="62" height="62" preserveAspectRatio="xMidYMid meet"/></g></svg></div>
<div class="bar"><div id="info" class="info">مسیر نمایشی آماده است</div><input id="timeline" type="range" min="0" max="0" value="0"><div class="row"><button data-s="1" class="active">1×</button><button data-s="2">2×</button><button data-s="5">5×</button><button data-s="10">10×</button></div><div class="row"><button id="play">پخش</button><button id="pause">مکث</button><button id="restart">از ابتدا</button><button id="fit">کل مسیر</button></div></div>
<script>
let trip=null,xy=[],index=0,speed=1,frame=null,paused=false,heading=0;const q=id=>document.getElementById(id),lerp=(a,b,t)=>a+(b-a)*t;function point(p){return{lat:Number(p.lat??p.latitude),lon:Number(p.lon??p.longitude),speed:Number(p.speedKph??p.speed??0),rpm:Number(p.rpm??0),label:p.label||'',stop:!!p.stop,t:Number(p.t??p.timestamp??(p.offsetSeconds||0)*1000)}}function angle(a,b){if(!a||!b)return heading;return Math.atan2(b.y-a.y,b.x-a.x)*180/Math.PI+90}function shortest(a,b){return((b-a+540)%360)-180}function angleLerp(a,b,t){return a+shortest(a,b)*t}function fitAll(){q('mapSvg').setAttribute('viewBox','-35 -35 1070 690');q('info').textContent=(trip?.titleFa||'مسیر')+' · کل مسیر در کادر قرار گرفت'}function setCar(pos,deg){heading=deg;q('car').setAttribute('transform',`translate(${pos.x.toFixed(2)} ${pos.y.toFixed(2)}) rotate(${deg.toFixed(2)})`)}function renderTrip(raw){trip=raw;trip.points=(raw.points||[]).map(point);if(!trip.points.length)return;q('timeline').max=trip.points.length-1;const a=trip.points,minLat=Math.min(...a.map(p=>p.lat)),maxLat=Math.max(...a.map(p=>p.lat)),minLon=Math.min(...a.map(p=>p.lon)),maxLon=Math.max(...a.map(p=>p.lon));xy=a.map(p=>({x:70+(p.lon-minLon)/(maxLon-minLon||1)*860,y:545-(p.lat-minLat)/(maxLat-minLat||1)*470}));q('route').setAttribute('points',xy.map(p=>p.x+','+p.y).join(' '));renderStops();draw(0);fitAll();q('info').textContent=raw.titleFa||'مسیر ثبت‌شده'}function renderRecordedTrip(raw){renderTrip(raw)}function renderStops(){const host=q('stops');host.innerHTML='';(trip?.stops||[]).forEach(s=>{let nearest=0,best=Infinity;trip.points.forEach((p,i)=>{const d=Math.abs(p.lat-s.lat)+Math.abs(p.lon-s.lon);if(d<best){best=d;nearest=i}});const pt=xy[nearest],c=document.createElementNS('http://www.w3.org/2000/svg','circle');c.setAttribute('cx',pt.x);c.setAttribute('cy',pt.y);c.setAttribute('r','8');c.setAttribute('fill','#ff6d7a');c.setAttribute('stroke','#fff');c.setAttribute('stroke-width','3');host.appendChild(c)})}function updateTrail(i,pos){const pts=xy.slice(0,Math.max(1,i+1));if(pos)pts.push(pos);q('trail').setAttribute('points',pts.map(p=>p.x+','+p.y).join(' '))}function draw(i){if(!trip)return;i=Math.max(0,Math.min(i,trip.points.length-1));index=i;const p=trip.points[i],c=xy[i],next=xy[Math.min(xy.length-1,i+1)];updateTrail(i);setCar(c,angle(c,next));q('timeline').value=i;q('info').textContent=(p.label?p.label+' · ':'')+Math.round(p.speed)+' km/h · '+Math.round(p.rpm)+' rpm'+(p.stop?' · توقف':'')}function stopAnim(){if(frame){cancelAnimationFrame(frame);frame=null}}function animateSegment(i){if(!trip||paused)return;if(i>=trip.points.length-1){draw(trip.points.length-1);stopAnim();return}index=i;const from=trip.points[i],to=trip.points[i+1],fromXY=xy[i],toXY=xy[i+1],target=angle(fromXY,toXY),startAngle=heading||target,start=performance.now(),recorded=Math.max(0,to.t-from.t),duration=Math.max(240,Math.min(1600,(recorded||850)/speed));const step=now=>{if(paused)return;const t=Math.min(1,(now-start)/duration),pos={x:lerp(fromXY.x,toXY.x,t),y:lerp(fromXY.y,toXY.y,t)},spd=lerp(from.speed,to.speed,t),rpm=lerp(from.rpm,to.rpm,t),deg=angleLerp(startAngle,target,Math.min(1,t*2.2));updateTrail(i,pos);setCar(pos,deg);q('timeline').value=(i+t).toFixed(3);q('info').textContent=((t<.5?from.label:to.label)?((t<.5?from.label:to.label)+' · '):'')+Math.round(spd)+' km/h · '+Math.round(rpm)+' rpm'+(t>.5&&to.stop?' · توقف':'');if(t<1)frame=requestAnimationFrame(step);else animateSegment(i+1)};frame=requestAnimationFrame(step)}function run(start=false){if(!trip)return;if(start||index>=trip.points.length-1)index=0;stopAnim();paused=false;fitAll();animateSegment(index)}q('play').onclick=()=>run(false);q('pause').onclick=()=>{paused=true;stopAnim()};q('restart').onclick=()=>run(true);q('fit').onclick=fitAll;q('timeline').oninput=e=>{paused=true;stopAnim();draw(Math.round(+e.target.value))};document.querySelectorAll('[data-s]').forEach(b=>b.onclick=()=>{speed=+b.dataset.s;document.querySelectorAll('[data-s]').forEach(x=>x.classList.toggle('active',x===b))});
</script></body></html>
