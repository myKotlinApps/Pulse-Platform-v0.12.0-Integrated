 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="theme-color" content="#0a0e17"/>
<title>ECU Pulse — Smart Vehicle</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link crossorigin href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#0a0e17;--card:#141a26;--border:#1e2533;--accent:#00b4d8;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;--text:#e2e8f0;--dim:#64748b}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit;color:inherit}
input{outline:none;border:none;background:none;font-family:inherit;color:inherit;font-size:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
#root{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;position:sticky;top:0;z-index:10;background:var(--bg)}
.header-logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#00b4d8,#0077b6);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff}
.header-logo h1{font-size:17px;font-weight:700;letter-spacing:-.3px}
.header-logo small{display:block;font-size:10px;color:var(--dim);font-weight:400;margin-top:-2px}
.header-actions{display:flex;gap:6px}
.header-actions button{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--dim)}
.speed-hero{display:flex;flex-direction:column;align-items:center;padding:10px 20px 20px}
.speed-ring{position:relative;width:180px;height:180px}
.speed-ring svg{transform:rotate(-135deg)}
.speed-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.speed-inner .val{font-size:52px;font-weight:800;letter-spacing:-2px;line-height:1}
.speed-inner .unit{font-size:14px;color:var(--dim);font-weight:500;margin-top:2px}
.speed-inner .sub{font-size:11px;color:var(--dim);margin-top:4px}
.speed-tags{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;justify-content:center}
.speed-tags span{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px}
.tag-conn{background:rgba(34,197,94,.1);color:var(--green)}
.tag-mode{background:rgba(0,180,216,.1);color:var(--accent)}
.tab-bar{display:flex;overflow-x:auto;padding:0 16px;gap:4px;margin-bottom:8px;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:8px 16px;border-radius:20px;font-size:12px;font-weight:600;white-space:nowrap;color:var(--dim)}
.tab-btn.on{background:var(--accent);color:#fff}
.sec-title{padding:0 20px;margin:18px 0 12px;font-size:13px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--dim)}
.gauge-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px}
.gcard{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;overflow:hidden}
.gcard:active{transform:scale(.98)}
.gcard .glow{position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.04}
.glabel{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.gwrap{position:relative;width:90px;height:90px}
.gwrap svg{transform:rotate(-135deg)}
.gcenter{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gcenter .gval{font-size:24px;font-weight:700;font-family:'SF Mono','Courier New',monospace}
.gcenter .gunit{font-size:10px;color:var(--dim)}
.gstatus{font-size:10px;font-weight:600;padding:3px 8px;border-radius:10px}
.terminal-card{margin:0 16px;background:#060a12;border:1px solid var(--border);border-radius:16px;overflow:hidden}
.terminal-head{display:flex;align-items:center;gap:6px;padding:12px 14px;border-bottom:1px solid var(--border);font-size:11px;color:var(--dim)}
.terminal-head .dot{width:6px;height:6px;border-radius:50%}
.terminal-body{height:220px;overflow-y:auto;padding:12px 14px;font-family:'SF Mono','Courier New',monospace;font-size:11px;line-height:1.7}
.terminal-body .tx{color:var(--accent)}
.terminal-body .rx{color:var(--green)}
.terminal-body .info{color:var(--dim)}
.term-row{display:flex;border-top:1px solid var(--border)}
.term-row input{flex:1;padding:12px 14px;background:transparent;font-family:'SF Mono','Courier New',monospace;font-size:12px;color:var(--text)}
.term-row button{padding:12px 18px;background:var(--accent);color:#fff;font-weight:600;font-size:12px}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;padding:0 16px;margin-top:10px}
.chip{padding:6px 14px;border-radius:16px;border:1px solid var(--border);font-size:11px;font-family:'SF Mono','Courier New',monospace;color:var(--dim)}
.dtc-list{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.dtc-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;display:flex;align-items:center;gap:12px}
.dtc-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.icrit{background:rgba(239,68,68,.1);color:var(--red)}
.iwarn{background:rgba(245,158,11,.1);color:var(--amber)}
.iinfo{background:rgba(0,180,216,.1);color:var(--accent)}
.dtc-body{flex:1;min-width:0}
.dtc-body strong{font-size:13px;font-weight:600}
.dtc-body p{font-size:11px;color:var(--dim);margin-top:2px}
.dtc-badge{padding:3px 8px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:.3px}
.bcrit{background:rgba(239,68,68,.15);color:var(--red)}
.bwarn{background:rgba(245,158,11,.15);color:var(--amber)}
.hlist{padding:0 16px;display:flex;flex-direction:column;gap:6px}
.hrow{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;background:var(--card);border:1px solid var(--border);border-radius:12px}
.hleft{display:flex;align-items:center;gap:10px}
.hdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.hleft strong{font-size:13px;font-weight:600}
.hright{display:flex;align-items:center;gap:10px}
.hright .hscore{font-size:14px;font-weight:700;font-family:'SF Mono','Courier New',monospace}
.hbar{width:60px;height:4px;border-radius:2px;background:var(--border);overflow:hidden}
.hbar div{height:100%;border-radius:2px}
.score-section{display:flex;flex-direction:column;align-items:center;padding:10px 20px 0}
.sr-big{position:relative;width:160px;height:160px}
.sr-big svg{transform:rotate(-135deg)}
.sr-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.sr-bigval{font-size:48px;font-weight:800;letter-spacing:-2px}
.sr-label{font-size:12px;color:var(--dim);margin-top:2px}
.score-detail{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px;margin-top:14px}
.sitem{padding:12px;background:var(--card);border-radius:12px;display:flex;flex-direction:column;gap:4px}
.sitem .sl{font-size:10px;color:var(--dim);text-transform:uppercase}
.sitem .sv{font-size:18px;font-weight:700}
.sitem .sb{height:3px;border-radius:2px;margin-top:4px}
.mapbox{height:300px;border-radius:16px;overflow:hidden;margin:0 16px;border:1px solid var(--border)}
.bnav{display:flex;justify-content:space-around;padding:8px 12px 20px;background:#10151f;border-top:1px solid var(--border);position:sticky;bottom:0}
.bnav button{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 12px;border-radius:12px;color:var(--dim)}
.bnav button.on{color:var(--accent)}
.bnav button svg{width:20px;height:20px}
.bnav button span{font-size:10px;font-weight:600;letter-spacing:.3px}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--card);border-bottom:1px solid var(--border)}
.set-row:first-child{border-radius:16px 16px 0 0}
.set-row:last-child{border-radius:0 0 16px 16px;border-bottom:none}
.set-row:only-child{border-radius:16px}
.set-l strong{font-size:13px;font-weight:600;display:block}
.set-l small{font-size:10px;color:var(--dim);display:block;margin-top:2px}
.toggle{width:44px;height:26px;border-radius:13px;background:var(--border);position:relative}
.toggle.on-bg{background:var(--accent)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff}
.toggle.on-bg::after{left:21px}
@keyframes fi{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.page-in{animation:fi .25s ease-out}
.scroll{flex:1;overflow-y:auto;padding-bottom:20px}
.empty{padding:40px 20px;text-align:center;color:var(--dim)}
.emptyp{font-size:13px}
.btn-act{padding:12px 24px;border-radius:24px;background:var(--accent);color:#fff;font-weight:700;font-size:13px;letter-spacing:.3px;width:100%;text-align:center}
.btn-out{padding:10px 20px;border-radius:20px;border:1px solid var(--border);color:var(--text);font-size:12px;font-weight:600}
</style>
</head>
<body><div id="root"></div>
<script>
var e=React.createElement;
function S(d,sz,clr){return e('svg',{width:sz||20,height:sz||20,fill:'none',stroke:clr||'currentColor',strokeWidth:2,viewBox:'0 0 24 24'},e('path',{d:d,strokeLinecap:'round',strokeLinejoin:'round'}));}
var IC={
  home:'M3 12l2-2 7-7 7 7 2 2M9 21V9h6v12M5 21h14',
  gauge:'M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4M4.9 19.1l2.8-2.8M16.3 7.7l2.8-2.8',
  scan:'M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M7 12h10',
  car:'M5 11l2-6h10l2 6M3 14h18v5a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-5z',
  map:'M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4zM8 2v16M16 22V6',
  err:'M10.3 4.3L1.5 20a1 1 0 0 0 .9 1.5h19.2a1 1 0 0 0 .9-1.5L13.7 4.3a1 1 0 0 0-1.7 0zM12 9v5',
  gear:'M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6zM12 1v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4',
  bolt:'M13 2L3 14h9l-1 8 10-12h-9l1-8z',
  thermometer:'M14 14.8V6a2 2 0 1 0-4 0v8.8a4 4 0 1 0 4 0zM12 18v-4',
  activity:'M22 12h-4l-3 9L9 3l-3 9H2',
  compass:'M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zM16.2 7.8l-2.4 6-1.8-1.8-1.8 1.8-2.4-6 6 2.4z',
  crown:'M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14l-5-4.87 6.91-1.01z'
};
var NAV=[
  {id:'home',icon:IC.home,label:'Dashboard'},
  {id:'diagnostics',icon:IC.scan,label:'Diagnostics'},
  {id:'trips',icon:IC.map,label:'Trips'},
  {id:'scanner',icon:IC.activity,label:'Scanner'},
  {id:'settings',icon:IC.gear,label:'Settings'}
];

function ArcGauge(props){
  var r=38,circ=2*Math.PI*r;
  var pct=props.value!=null?Math.min(1,Math.max(0,(props.value-props.min)/(props.max-props.min))):0;
  var dash=pct*circ*0.75,off=circ*0.875;
  return e('div',{className:'gcard',onClick:props.onClick},
    e('div',{className:'glow',style:{background:props.color}}),
    e('span',{className:'glabel'},props.label),
    e('div',{className:'gwrap'},
      e('svg',{viewBox:'0 0 100 100',width:'100%',height:'100%'},
        e('circle',{cx:50,cy:50,r:r,fill:'none',stroke:'#1e2533',strokeWidth:6,
          strokeDasharray:circ*0.75+' '+circ*0.25,strokeDashoffset:off,strokeLinecap:'round'}),
        e('circle',{cx:50,cy:50,r:r,fill:'none',stroke:props.color,strokeWidth:6,
          strokeDasharray:dash+' '+circ,strokeDashoffset:off,strokeLinecap:'round',
          style:{transition:'stroke-dasharray .6s ease',filter:'drop-shadow(0 0 6px '+props.color+')'}})),
      e('div',{className:'gcenter'},
        e('span',{className:'gval'},props.value!=null?props.value:'--'),
        e('span',{className:'gunit'},props.unit))),
    props.status?e('span',{className:'gstatus',
      style:{background:props.status==='ok'?'rgba(34,197,94,.1)':'rgba(245,158,11,.1)',
             color:props.status==='ok'?'#22c55e':'#f59e0b'}},
      props.statusText):null);
}

function HomePage(){
  var _s=React.useState({rpm:2450,speed:68,coolant:91,voltage:13.8,load:34}),live=_s[0],setLive=_s[1];
  React.useEffect(function(){
    var t=setInterval(function(){setLive({
      rpm:Math.floor(2000+Math.random()*1500),speed:Math.floor(50+Math.random()*60),
      coolant:Math.floor(82+Math.random()*18),voltage:+(13.2+Math.random()*1.4).toFixed(1),
      load:Math.floor(20+Math.random()*55)
    });},2000);
    return function(){clearInterval(t);};
  },[]);
  var spdPct=live.speed/240;
  return e('div',{className:'page-in scroll'},
    e('div',{className:'speed-hero'},
      e('div',{className:'speed-ring'},
        e('svg',{viewBox:'0 0 200 200',width:'100%',height:'100%'},
          e('circle',{cx:100,cy:100,r:85,fill:'none',stroke:'#1e2533',strokeWidth:10,
            strokeDasharray:'400 600',strokeDashoffset:500,strokeLinecap:'round'}),
          e('circle',{cx:100,cy:100,r:85,fill:'none',stroke:'#00b4d8',strokeWidth:10,
            strokeDasharray:(spdPct*400)+' 600',strokeDashoffset:500,strokeLinecap:'round',
            style:{transition:'stroke-dasharray .6s ease',filter:'drop-shadow(0 0 8px rgba(0,180,216,.3))'}})),
        e('div',{className:'speed-inner'},
          e('span',{className:'val'},live.speed),
          e('span',{className:'unit'},'km/h'),
          e('span',{className:'sub'},'RPM '+live.rpm))),
      e('div',{className:'speed-tags'},
        e('span',{className:'tag-conn'},'Connected'),
        e('span',{className:'tag-mode'},'OBD-II Demo'))),
    e('div',{className:'gauge-grid'},
      e(ArcGauge,{label:'Coolant',value:live.coolant,unit:'C',min:60,max:120,color:'#f59e0b',
        status:live.coolant>90?'warn':'ok',statusText:live.coolant>90?'Warm':'Normal'}),
      e(ArcGauge,{label:'Battery',value:live.voltage,unit:'V',min:10,max:16,color:'#22c55e',
        status:live.voltage<11.5?'warn':'ok',statusText:live.voltage<11.5?'Low':'Normal'}),
      e(ArcGauge,{label:'Load',value:live.load,unit:'%',min:0,max:100,color:'#8b5cf6',
        status:live.load>80?'warn':'ok',statusText:live.load>80?'Heavy':'Normal'}),
      e(ArcGauge,{label:'RPM',value:live.rpm,unit:'rpm',min:0,max:8000,color:'#ef4444',
        status:live.rpm>5000?'warn':'ok',statusText:live.rpm>5000?'High':'Normal'})));
}

function DiagnosticsPage(){
  var _r=React.useState(false),ran=_r[0],setRan=_r[1];
  var items=[
    {name:'Engine',score:92},{name:'Transmission',score:88},{name:'Brakes',score:72,note:'Pads wearing'},
    {name:'Battery',score:95},{name:'Emissions',score:90},{name:'Cooling',score:87},
    {name:'Electrical',score:91},{name:'Suspension',score:85}];
  var avg=ran?Math.round(items.reduce(function(a,i){return a+i.score;},0)/items.length):0;
  var sc=avg>80?'#22c55e':'#f59e0b';
  var dtcs=[{code:'P0133',desc:'O2 Sensor Slow Response',sv:'warning'},{code:'P0420',desc:'Catalyst Below Threshold',sv:'critical'},{code:'P0301',desc:'Cylinder 1 Misfire',sv:'info'}];
  return e('div',{className:'page-in scroll'},
    e('div',{className:'sec-title'},'Vehicle Health'),
    !ran?e('div',null,
      e('div',{className:'empty'},S(IC.scan,40,'#64748b'),e('p',{className:'emptyp',style:{marginTop:12}},'Tap to run a full diagnostic scan')),
      e('div',{style:{padding:'0 16px',marginTop:12}},e('button',{className:'btn-act',onClick:function(){setRan(true);}},'Run Diagnostic Scan')))
    :e('div',null,
      e('div',{className:'score-section'},
        e('div',{className:'sr-big'},
          e('svg',{viewBox:'0 0 200 200',width:'100%',height:'100%'},
            e('circle',{cx:100,cy:100,r:65,fill:'none',stroke:'#1e2533',strokeWidth:10,strokeDasharray:'300 500',strokeDashoffset:400}),
            e('circle',{cx:100,cy:100,r:65,fill:'none',stroke:sc,strokeWidth:10,strokeLinecap:'round',
              strokeDasharray:(avg/100)*300+' 500',strokeDashoffset:400,
              style:{transition:'stroke-dasharray 1s ease',filter:'drop-shadow(0 0 6px '+sc+')'}})),
          e('div',{className:'sr-center'},e('span',{className:'sr-bigval',style:{color:sc}},avg),e('span',{className:'sr-label'},'Health Score')))),
      e('div',{className:'sec-title'},'System Status'),
      e('div',{className:'hlist'},
        items.map(function(i){var ok=i.score>=80;return e('div',{key:i.name,className:'hrow'},
          e('div',{className:'hleft'},e('div',{className:'hdot',style:{background:ok?'#22c55e':'#f59e0b'}}),e('strong',null,i.name)),
          e('div',{className:'hright'},e('div',{className:'hbar'},e('div',{style:{width:i.score+'%',background:ok?'#22c55e':'#f59e0b'}})),e('span',{className:'hscore'},i.score)));}))),
    e('div',{className:'sec-title'},'Active Fault Codes'),
    e('div',{className:'dtc-list'},
      dtcs.map(function(d){var icls=d.sv==='critical'?'icrit':d.sv==='warning'?'iwarn':'iinfo';
        var bcls=d.sv==='critical'?'bcrit':'bwarn';var icon=d.sv==='critical'?'!':d.sv==='warning'?'~':'i';
        return e('div',{key:d.code,className:'dtc-card'},
          e('div',{className:'dtc-icon '+icls},icon),e('div',{className:'dtc-body'},e('strong',null,d.code),e('p',null,d.desc)),
          e('span',{className:'dtc-badge '+bcls},d.sv.toUpperCase()));})));
}

function ScannerPage(){
  var _s=React.useState([{dir:'info',text:'ECU Pulse ELM327 v2.0',time:Date.now()},{dir:'info',text:'Demo mode active',time:Date.now()}]),lines=_s[0],setLines=_s[1];
  var _i=React.useState(''),input=_i[0],setInput=_i[1];
  var _c=React.useState(true),conn=_c[0],setConn=_c[1];
  var botRef=React.useRef(null);
  var DEMO={};DEMO.ATZ='ELM327 v2.1';DEMO.ATL0='OK';DEMO.ATH1='OK';DEMO['0100']='41 00 BE 1F B8 10';
  DEMO['010C']='41 0C 1A F8';DEMO['010D']='41 0D 30';DEMO['0105']='41 0D 46';DEMO.ATDPN='6';DEMO.ATRV='13.8V';DEMO.ATMA='BUS ACTIVE';
  function send(cmd){var c=(cmd||input).trim().toUpperCase();if(!c)return;
    setLines(function(p){return p.concat([{dir:'tx',text:'> '+c,time:Date.now()}]);});
    setTimeout(function(){setLines(function(p){return p.concat([{dir:'rx',text:DEMO[c]||'?',time:Date.now()}]);});},250);
    setInput('');}
  React.useEffect(function(){if(botRef.current)botRef.current.scrollIntoView({behavior:'smooth'});},[lines]);
  return e('div',{className:'page-in scroll'},

      e('div',{className:'terminal-head'},e('div',{className:'dot',style:{background:conn?'#22c55e':'#64748b'}}),(conn?'ELM327 v2.1 Connected':'Disconnected')),
      e('div',{className:'terminal-body'},lines.map(function(l,i){return e('div',{key:i,className:l.dir},l.text);}),e('div',{ref:botRef})),
      e('div',{className:'term-row'},
        e('input',{value:input,onChange:function(ev){setInput(ev.target.value);},onKeyDown:function(ev){if(ev.key==='Enter')send();},placeholder:'OBD/AT command...'}),
        e('button',{onClick:function(){send();}},'Send'))),
    e('div',{className:'chip-row'},
      ['ATZ','010C','010D','0105','ATDPN','ATRV','ATMA'].map(function(c){return e('button',{key:c,className:'chip',onClick:function(){send(c);}},c);})),
    e('div',{style:{padding:'0 16px',marginTop:16,display:'flex',gap:8}},
      e('button',{className:'btn-out',style:{flex:1},onClick:function(){setLines([{dir:'info',text:'cleared',time:Date.now()}]);}},'Clear'),
      e('button',{className:'btn-out',style:{flex:1},onClick:function(){var nc=!conn;setConn(nc);setLines(function(p){return p.concat([{dir:'info',text:nc?'Connected':'Disconnected',time:Date.now()}]);});}},conn?'Disconnect':'Connect')));
}

function TripsPage(){
  var mapRef=React.useRef(null),mInst=React.useRef(null);
