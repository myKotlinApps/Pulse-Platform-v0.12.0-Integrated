 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="theme-color" content="#ffffff"/>
<title>ECU Pulse — Smart Vehicle Diagnostics</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link crossorigin href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#f0f2f5;--card:#ffffff;--border:#e5e7eb;--accent:#2563eb;--accent2:#06b6d4;--green:#16a34a;--amber:#d97706;--red:#dc2626;--text:#111827;--dim:#6b7280;--brand:#1e40af;--brand-light:#dbeafe}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit;color:inherit}
input{outline:none;border:none;background:none;font-family:inherit;color:inherit;font-size:inherit}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
#root{max-width:480px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;background:var(--bg)}

.header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;background:var(--card);border-bottom:1px solid var(--border)}
.hl{display:flex;align-items:center;gap:10px}
.hl .ic{width:38px;height:38px;border-radius:12px;background:linear-gradient(135deg,#2563eb,#06b6d4);display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(37,99,235,.25)}
.hl .ic span{font-size:18px}
.hl h1{font-size:17px;font-weight:700;color:var(--text)}
.hl s{display:block;font-size:10px;font-weight:400;color:var(--dim)}

.speed-hero{display:flex;flex-direction:column;align-items:center;padding:20px 20px 16px;background:var(--card);margin:0 0 8px}
.sr{position:relative;width:190px;height:190px}
.sr svg{transform:rotate(-135deg)}
.sri{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.sri .v{font-size:56px;font-weight:800;letter-spacing:-3px;line-height:1;color:var(--text)}
.sri .u{font-size:14px;color:var(--dim);font-weight:500;margin-top:2px}
.sri .s{font-size:11px;color:var(--dim);margin-top:4px;background:#f3f4f6;padding:3px 10px;border-radius:10px}
.tags{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;justify-content:center}
.tags span{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600}
.tg{background:#dcfce7;color:#16a34a}
.tb{background:var(--brand-light);color:var(--brand)}

.tab-bar{display:flex;overflow-x:auto;padding:8px 16px;gap:6px;background:var(--card);margin-bottom:8px;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tb-btn{padding:8px 18px;border-radius:22px;font-size:12px;font-weight:600;white-space:nowrap;color:var(--dim);transition:all .2s}
.tb-btn.on{background:var(--brand);color:#fff;box-shadow:0 2px 8px rgba(30,64,175,.2)}

.sec{padding:0 20px;margin:20px 0 10px;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:8px}
.sec::before{content:'';width:3px;height:14px;background:var(--brand);border-radius:2px}

.gg{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px}
.g{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;box-shadow:0 1px 2px rgba(0,0,0,.03);position:relative;overflow:hidden}
.g .ico{font-size:26px;margin-bottom:-4px}
.g .lb{font-size:11px;color:var(--dim);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.g .rv{position:relative;width:84px;height:84px}
.g .rv svg{transform:rotate(-135deg)}
.g .rc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.g .rc .vl{font-size:22px;font-weight:700;font-family:'SF Mono',monospace;color:var(--text)}
.g .rc .un{font-size:10px;color:var(--dim)}
.g .st{font-size:10px;font-weight:600;padding:3px 10px;border-radius:10px}

.term{margin:0 16px;background:#1e293b;border-radius:18px;overflow:hidden}
.term .th{display:flex;align-items:center;gap:8px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08);font-size:11px;color:#94a3b8}
.term .th .dot{width:2px;height:2px;border-radius:50%;padding:3px}
.term .tb{height:200px;overflow-y:auto;padding:12px 16px;font-family:'SF Mono',monospace;font-size:11px;line-height:1.7;color:#e2e8f0}
.term .tb .tx{color:#38bdf8}
.term .tb .rx{color:#4ade80}
.term .tb .info{color:#64748b}
.term .tr{display:flex;border-top:1px solid rgba(255,255,255,.08)}
.term .tr input{flex:1;padding:12px 16px;background:transparent;font-family:'SF Mono',monospace;font-size:12px;color:#f1f5f9}
.term .tr button{padding:12px 18px;background:#2563eb;color:#fff;font-weight:600;font-size:12px}

.chips{display:flex;gap:6px;flex-wrap:wrap;padding:0 16px;margin-top:10px}
.ch{border-radius:16px;font-size:11px;font-family:'SF Mono',monospace;transition:all .15s}

.dl{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.dc{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.di{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.die{background:#fef2f2;color:#dc2626}.diw{background:#fffbeb;color:#d97706}.dib{background:#dbeafe;color:#2563eb}
.db{flex:1;min-width:0}
.db strong{font-size:13px;font-weight:600}
.db p{font-size:11px;color:var(--dim);margin-top:2px}
.dbdg{padding:3px 10px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:.5px}
.dbe{background:#fef2f2;color:#dc2626}.dbw{background:#fffbeb;color:#d97706}

.hl2{padding:0 16px;display:flex;flex-direction:column;gap:6px}
.hr{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.hlf{display:flex;align-items:center;gap:10px}
.hdt{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.hlf strong{font-size:13px;font-weight:600}
.hrt{display:flex;align-items:center;gap:10px}
.hrt .hs{font-size:14px;font-weight:700;font-family:'SF Mono',monospace}
.hrt .hb{width:60px;height:5px;border-radius:3px;background:#e5e7eb;overflow:hidden}
.hrt .hb div{height:100%;border-radius:3px;transition:width .5s ease}

.scs{display:flex;flex-direction:column;align-items:center;padding:16px 20px 0;background:var(--card);margin:0 0 8px}
.srb{position:relative;width:170px;height:170px}
.srb svg{transform:rotate(-135deg)}
.sbc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.sbc .bv{font-size:52px;font-weight:800;letter-spacing:-3px}
.sbc .bl{font-size:12px;color:var(--dim);margin-top:4px}

.sd{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 16px;margin-top:14px}
.si{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;display:flex;flex-direction:column;gap:6px;box-shadow:0 1px 2px rgba(0,0,0,.03)}
.si .sla{font-size:10px;color:var(--dim);text-transform:uppercase;font-weight:600}
.si .svl{font-size:20px;font-weight:700}
.si .sba{height:4px;border-radius:2px;background:#e5e7eb;overflow:hidden;margin-top:2px}
.si .sba div{height:100%;border-radius:2px;transition:width .4s ease}

.map-box{height:280px;border-radius:18px;overflow:hidden;margin:0 16px;border:1px solid var(--border);box-shadow:0 1px 2px rgba(0,0,0,.05)}

.bnav{display:flex;justify-content:space-around;padding:10px 14px 22px;background:var(--card);border-top:1px solid var(--border);position:sticky;bottom:0}
.bnav button{display:flex;flex-direction:column;align-items:center;gap:5px;padding:8px 14px;border-radius:14px;transition:all .2s;color:var(--dim)}
.bnav button svg{width:22px;height:22px;fill:none;stroke-width:2;transition:all .2s}
.bnav button.on{color:var(--brand)}
.bnav button.on svg{fill:var(--brand-light);stroke:var(--brand)}
.bnav button span{font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}

.srow{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;background:var(--card);border-bottom:1px solid var(--border)}
.srow:first-child{border-radius:18px 18px 0 0}
.srow:last-child{border-radius:0 0 18px 18px;border-bottom:none}
.srow:only-child{border-radius:18px}
.srl strong{font-size:13px;font-weight:600;display:block}
.srl small{font-size:10px;color:var(--dim);display:block;margin-top:2px}
.switch{width:46px;height:28px;border-radius:14px;background:#d1d5db;position:relative;transition:all .25s}
.switch.on{background:var(--brand)}
.switch::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15);transition:all .25s}
.switch.on::after{left:21px}

@keyframes fi{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.pi{animation:fi .3s ease-out}
.scroll{flex:1;overflow-y:auto;padding-bottom:20px}
.empty{text-align:center;padding:32px 20px;color:var(--dim)}
.empty .emoji{font-size:48px;margin-bottom:12px}
.emptyp{font-size:13px}
.bact{padding:14px 24px;border-radius:26px;font-weight:700;font-size:14px;width:100%;text-align:center}
.blue{background:var(--brand);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.3)}
.bout{padding:10px 22px;border-radius:22px;border:2px solid var(--border);color:var(--text);font-size:12px;font-weight:600}
.bout:hover{border-color:var(--brand);color:var(--brand)}
.tip-card{background:#f8fafc;border:1px solid var(--border);border-radius:14px;padding:14px;font-size:12px;color:var(--dim);line-height:1.7}
</style>
</head>
<body><div id="root"></div>
<script>
var e=React.createElement;

function NavIcon(props){
  var id=props.id, on=props.on, sz=24;
  // Beautiful filled-style icons that change when active
  if(id==='home'){
    return on?e('svg',{width:sz,height:sz,viewBox:'0 0 24 24',fill:'#dbeafe',stroke:'#2563eb',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},
      e('path',{d:'M3 10l9-7 9 7v11a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V10z'}))
    :e('svg',{width:sz,height:sz,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},
      e('path',{d:'M3 10l9-7 9 7v11a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1V10z'}));
  }
  if(id==='diagnostics'){
    return on?e('svg',{width:sz,height:sz,viewBox:'0 0 24 24',fill:'#dbeafe',stroke:'#2563eb',strokeWidth:2},
      e('circle',{cx:12,cy:12,r:10}),e('path',{d:'M12 6v6l4 2'}))
    :e('svg',{width:sz,height:sz,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},
      e('circle',{cx:12,cy:12,r:10}),e('path',{d:'M12 6v6l4 2'}));
  }
  if(id==='trips'){
    return on?e('svg',{width:sz,height:sz,viewBox:'0 0 24 24',fill:'#dbeafe',stroke:'#2563eb',strokeWidth:2,strokeLinejoin:'round'},
      e('path',{d:'M3 18l4-2.5 4 2.5 4-2.5 4 2.5M3 12l4-2.5 4 2.5 4-2.5 4 2.5M3 6l4-2.5 4 2.5 4-2.5 4 2.5'}),
      e('circle',{cx:7,cy:3.5,r:2.5,fill:'#dbeafe'}),e('circle',{cx:17,cy:20.5,r:2.5,fill:'#dbeafe'}))
    :e('svg',{width:sz,height:sz,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},
      e('path',{d:'M3 18l4-2.5 4 2.5 4-2.5 4 2.5M3 12l4-2.5 4 2.5 4-2.5 4 2.5M3 6l4-2.5 4 2.5 4-2.5 4 2.5'}));
  }
  if(id==='scanner'){
    return on?e('svg',{width:sz,height:sz,viewBox:'0 0 24 24',fill:'#dbeafe',stroke:'#2563eb',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},
      e('circle',{cx:12,cy:12,r:10}),e('path',{d:'M12 2a10 10 0 0 1 10 10M12 22a10 10 0 0 1 0-20M2 12a10 10 0 0 1 10-10'}),
      e('circle',{cx:12,cy:12,r:2,fill:'#2563eb'}))
    :e('svg',{width:sz,height:sz,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},
      e('circle',{cx:12,cy:12,r:10}),e('path',{d:'M12 2a10 10 0 0 1 10 10M12 22a10 10 0 0 1 0-20M2 12a10 10 0 0 1 10-10'}));
  }
  if(id==='settings'){
    return on?e('svg',{width:sz,height:sz,viewBox:'0 0 24 24',fill:'#dbeafe',stroke:'#2563eb',strokeWidth:2,strokeLinejoin:'round'},
      e('circle',{cx:12,cy:12,r:3}),e('path',{d:'M19.4 15a1.7 1.7 0 0 0 .3 1.7l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.7-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 0 1-4 0v-.3A1.7 1.7 0 0 0 9 19a1.7 1.7 0 0 0-1.7.3l-.1.1a2 2 0 0 1-2.8-2.8l.1-.1A1.7 1.7 0 0 0 4.8 15a1.7 1.7 0 0 0-1.6-1H3a2 2 0 0 1 0-4h.3A1.7 1.7 0 0 0 4.8 9a1.7 1.7 0 0 0-.3-1.7l-.1-.1a2 2 0 0 1 2.8-2.8l.1.1A1.7 1.7 0 0 0 9 4.8a1.7 1.7 0 0 0 1-1.6V3a2 2 0 0 1 4 0v.3A1.7 1.7 0 0 0 15 4.8a1.7 1.7 0 0 0 1.7-.3l.1-.1a2 2 0 0 1 2.8 2.8l-.1.1A1.7 1.7 0 0 0 19.2 9a1.7 1.7 0 0 0 1.6 1h.3a2 2 0 0 1 0 4h-.3a1.7 1.7 0 0 0-1.4 1z'}))
    :e('svg',{width:sz,height:sz,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},
      e('circle',{cx:12,cy:12,r:3}),e('path',{d:'M19.4 15a1.7 1.7 0 0 0 .3 1.7l.1.1a2 2 0 0 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.7-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 0 1-4 0v-.3A1.7 1.7 0 0 0 9 19a1.7 1.7 0 0 0-1.7.3l-.1.1a2 2 0 0 1-2.8-2.8l.1-.1A1.7 1.7 0 0 0 4.8 15a1.7 1.7 0 0 0-1.6-1H3a2 2 0 0 1 0-4h.3A1.7 1.7 0 0 0 4.8 9a1.7 1.7 0 0 0-.3-1.7l-.1-.1a2 2 0 0 1 2.8-2.8l.1.1A1.7 1.7 0 0 0 9 4.8a1.7 1.7 0 0 0 1-1.6V3a2 2 0 0 1 4 0v.3A1.7 1.7 0 0 0 15 4.8a1.7 1.7 0 0 0 1.7-.3l.1-.1a2 2 0 0 1 2.8 2.8l-.1.1A1.7 1.7 0 0 0 19.2 9a1.7 1.7 0 0 0 1.6 1h.3a2 2 0 0 1 0 4h-.3a1.7 1.7 0 0 0-1.4 1z'}));
  }
  return e('div',null);
}

var NAV=[{id:'home',label:'Home'},{id:'diagnostics',label:'Diagnose'},{id:'trips',label:'Trips'},{id:'scanner',label:'Scanner'},{id:'settings',label:'Settings'}];

function ArcGauge(props){
  var r=36,circ=2*Math.PI*r;
  var pct=props.value!=null?Math.min(1,Math.max(0,(props.value-props.min)/(props.max-props.min))):0;
  var dash=pct*circ*0.72,off=circ*0.86;
  return e('div',{className:'g'},
    e('span',{className:'ico'},props.emoji),
    e('span',{className:'lb'},props.label),
    e('div',{className:'rv'},
      e('svg',{viewBox:'0 0 100 100',width:'100%',height:'100%'},
        e('circle',{cx:50,cy:50,r:r,fill:'none',stroke:'#e5e7eb',strokeWidth:7,strokeDasharray:circ*0.72+' '+circ*0.28,strokeDashoffset:off,strokeLinecap:'round'}),
        e('circle',{cx:50,cy:50,r:r,fill:'none',stroke:props.color,strokeWidth:7,strokeDasharray:dash+' '+circ,strokeDashoffset:off,strokeLinecap:'round',
          style:{transition:'stroke-dasharray .6s ease'}})),
      e('div',{className:'rc'},
        e('span',{className:'vl'},props.value!=null?props.value:'--'),
        e('span',{className:'un'},props.unit))),
    props.status?e('span',{className:'st',style:{background:props.status==='ok'?'#dcfce7':props.status==='warn'?'#fef3c7':'#fef2f2',color:props.status==='ok'?'#16a34a':props.status==='warn'?'#d97706':'#dc2626'}},props.statusText):null);
}

function HomePage(){
  var _s=React.useState({rpm:2450,speed:68,coolant:91,voltage:13.8,load:34}),live=_s[0],setLive=_s[1];
  React.useEffect(function(){
    var t=setInterval(function(){setLive({
      rpm:Math.floor(2000+Math.random()*1500),speed:Math.floor(50+Math.random()*60),
      coolant:Math.floor(82+Math.random()*18),voltage:+(13.2+Math.random()*1.4).toFixed(1),
      load:Math.floor(20+Math.random()*55)
    });},2000);
    return function(){clearInterval(t);};
  },[]);
  var sp=live.speed/240;
  return e('div',{className:'pi scroll'},
    e('div',{className:'speed-hero'},
      e('div',{className:'sr'},
        e('svg',{viewBox:'0 0 200 200',width:'100%',height:'100%'},
          e('circle',{cx:100,cy:100,r:85,fill:'none',stroke:'#e5e7eb',strokeWidth:12,strokeDasharray:'400 600',strokeDashoffset:500,strokeLinecap:'round'}),
          e('circle',{cx:100,cy:100,r:85,fill:'none',stroke:'#2563eb',strokeWidth:12,strokeDasharray:(sp*400)+' 600',strokeDashoffset:500,strokeLinecap:'round',
            style:{transition:'stroke-dasharray .6s ease',filter:'drop-shadow(0 2px 6px rgba(37,99,235,.2))'}})),
        e('div',{className:'sri'},
          e('span',{className:'v'},live.speed),e('span',{className:'u'},'km/h'),
          e('span',{className:'s'},'RPM '+live.rpm))),
      e('div',{className:'tags'},e('span',{className:'tg'},'Connected'),e('span',{className:'tb'},'OBD-II Live'))),
    e('div',{className:'gg'},
      e(ArcGauge,{emoji:'🌡️',label:'Coolant',value:live.coolant,unit:'°C',min:60,max:120,color:'#f59e0b',status:live.coolant>90?'warn':'ok',statusText:live.coolant>90?'Warm':'OK'}),
      e(ArcGauge,{emoji:'🔋',label:'Battery',value:live.voltage,unit:'V',min:10,max:16,color:'#16a34a',status:live.voltage<11.5?'warn':'ok',statusText:live.voltage<11.5?'Low':'OK'}),
      e(ArcGauge,{emoji:'⚡',label:'Engine Load',value:live.load,unit:'%',min:0,max:100,color:'#8b5cf6',status:live.load>80?'warn':'ok',statusText:live.load>80?'High':'OK'}),
      e(ArcGauge,{emoji:'🏎️',label:'RPM',value:live.rpm,unit:'rpm',min:0,max:8000,color:'#dc2626',status:live.rpm>5000?'warn':'ok',statusText:live.rpm>5000?'High':'OK'})));
}

function DiagnosticsPage(){
  var _r=React.useState(false),ran=_r[0],setRan=_r[1];
  var items=[{name:'Engine',score:92},{name:'Transmission',score:88},{name:'Brakes',score:72,note:'Pads wearing'},{name:'Battery',score:95},{name:'Emissions',score:90},{name:'Cooling',score:87},{name:'Electrical',score:91},{name:'Suspension',score:85}];
  var avg=ran?Math.round(items.reduce(function(a,i){return a+i.score;},0)/items.length):0;
  var sc=avg>80?'#16a34a':avg>60?'#d97706':'#dc2626';
  var dtcs=[{code:'P0133',desc:'O2 Sensor Slow Response - Bank 1',sv:'warning'},{code:'P0420',desc:'Catalyst Below Threshold',sv:'critical'},{code:'P0301',desc:'Cylinder 1 Misfire',sv:'info'}];
  return e('div',{className:'pi scroll'},
    !ran?e('div',null,
      e('div',{className:'empty'},e('div',{className:'emoji'},'🔍'),e('p',{className:'emptyp'},'Tap to run a full vehicle diagnostic')),
      e('div',{style:{padding:'0 20px',marginTop:16}},e('button',{className:'bact blue',onClick:function(){setRan(true);}},'🔬 Run Full Diagnostic')))
    :e('div',null,
      e('div',{className:'scs'},
        e('div',{className:'srb'},
