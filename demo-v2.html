 <!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#07111f"/>
<title>ECU Pulse — دیاگ هوشمند خودرو</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<link crossorigin href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#07111f;--surface:#0b1a2e;--card:#112240;--border:#1d3557;--accent:#3b82f6;--accent-hover:#2563eb;--muted:#8892b0;--bright:#ccd6f6;--green:#10b981;--red:#ef4444;--amber:#f59e0b;--purple:#8b5cf6;--mydiag-surface:#0d2137}
*{margin:0;padding:0;box-sizing:border-box}
html{font-family:"Segoe UI","Tahoma",system-ui,sans-serif;scroll-behavior:smooth}
body{min-height:100dvh;background:var(--bg);color:var(--bright);overflow:hidden}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit;font-size:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#root{display:flex;height:100dvh}
.sidebar{width:260px;background:var(--surface);border-left:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column}
.sidebar-brand{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-brand .ep{width:32px;height:32px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px}
.sidebar-nav{flex:1;overflow-y:auto;padding:8px}
.nav-btn{width:100%;display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:12px;font-size:13px;text-align:right;transition:all .15s;color:var(--muted)}
.nav-btn:hover{background:rgba(59,130,246,.08);color:var(--bright)}
.nav-btn.active{background:var(--card);border:1px solid var(--border);color:var(--accent)}
.nav-btn svg{width:18px;height:18px;flex-shrink:0}
.sidebar-foot{padding:12px 16px;border-top:1px solid var(--border);font-size:11px;color:var(--muted);text-transform:uppercase}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.header{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:12px}
.header-eyebrow{font-size:10px;color:var(--muted);letter-spacing:2px;display:block}
.header-title{font-size:14px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:16px 20px}
.glass{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px}
.hero-card{background:linear-gradient(135deg,var(--mydiag-surface),var(--bg));border:1px solid var(--border);border-radius:16px;padding:24px;position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;background:var(--accent);opacity:.04;border-radius:50%}
.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.menu-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;transition:all .2s;text-align:center}
.menu-card:hover{border-color:var(--accent);background:var(--card)}
.menu-card svg{width:24px;height:24px;flex-shrink:0}
.menu-card strong{font-size:13px;font-weight:600}
.menu-card small{font-size:11px;color:var(--muted)}
.btn-primary{background:var(--accent);color:#fff;padding:10px 22px;border-radius:10px;font-weight:600;font-size:13px;transition:all .2s}
.btn-primary:hover{background:var(--accent-hover)}
.btn-ghost{border:1px solid var(--border);color:var(--bright);padding:6px 14px;border-radius:10px}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.gauges-row{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
.gauge-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:8px;min-width:130px}
.gauge-ring{position:relative;width:110px;height:110px}
.gauge-ring svg{transform:rotate(-90deg)}
.gauge-value{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.gauge-value strong{font-size:22px;font-family:'Courier New',monospace}
.gauge-value small{font-size:9px;color:var(--muted)}
.terminal{background:#020b16;border:1px solid var(--border);border-radius:12px;height:350px;overflow-y:auto;padding:12px;font-family:'Courier New',monospace;font-size:12px}
.terminal .tx{color:var(--accent)}
.terminal .rx{color:var(--green)}
.terminal .info{color:var(--muted)}
.qcmd{display:inline-flex;padding:4px 10px;margin:3px;border:1px solid var(--border);border-radius:6px;font-size:11px;font-family:'Courier New',monospace;cursor:pointer;transition:all .15s}
.qcmd:hover{border-color:var(--accent);color:var(--accent)}
.badge{padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600}
.badge-pending{background:rgba(245,158,11,.15);color:#f59e0b}
.badge-confirmed{background:rgba(249,115,22,.15);color:#f97316}
.badge-permanent{background:rgba(239,68,68,.15);color:#ef4444}
.badge-green{background:rgba(16,185,129,.15);color:#10b981}
.health-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px}
.health-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;display:flex;align-items:center;gap:10px}
.health-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.map-container{height:350px;border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.score-ring{position:relative;width:140px;height:140px;margin:0 auto}
.score-ring svg{transform:rotate(-90deg)}
.score-val{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-val strong{font-size:40px;font-family:'Courier New',monospace}
.stats-row{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0}
.stat-chip{padding:5px 12px;border-radius:20px;font-size:11px;background:rgba(29,53,87,.5);color:var(--muted)}
.stat-chip.pro{background:rgba(234,179,8,.15);color:#eab308}
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-in{animation:slideUp .25s ease-out}
.input-field{padding:8px 12px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--bright);font-size:13px;font-family:'Courier New',monospace;outline:none;flex:1}
.input-field:focus{border-color:var(--accent)}
@media(max-width:768px){.sidebar{display:none}.menu-grid{grid-template-columns:repeat(3,1fr)}.gauges-row{gap:8px}.gauge-card{min-width:100px;padding:12px}.gauge-ring{width:90px;height:90px}}
</style>
</head>
<body><div id="root"></div>

  plug:'M8 3v5M16 3v5M6 8h12v3a6 6 0 0 1-6 6v4M9 21h6',

  temp:'M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z',

};
var NAV = [
  {id:'home',icon:IP.home,label:'خانه MyDiag'},
  {id:'dashboard',icon:IP.gauge,label:'داشبورد'},
  {id:'vehicles',icon:IP.car,label:'خودرو'},
  {id:'trips',icon:IP.route,label:'سفرها'},
  {id:'analysis',icon:IP.scan,label:'تحلیل ماشین من'},
  {id:'pro',icon:IP.crown,label:'نسخه Pro'},
  {id:'store',icon:IP.shop,label:'فروشگاه'},

var TITLES = {

  vehicles:['VEHICLE PROFILE','انتخاب خودرو'], trips:['GPS TRIP LOGGER','سفرها'],
  analysis:['DIAGEMAN API','تحلیل ماشین من'], pro:['ADVANCED CENTER','مرکز نسخه پیشرفته'],
  store:['UPGRADE','خرید و فعال‌سازی'], errors:['FAULT CENTER','خطا و پشتیبانی'],
  scanner:['ELM327 CONSOLE','اسکنر و کنسول ECU'], settings:['SETTINGS','تنظیمات'],
  'driving-style':['DRIVING STYLE','سبک رانندگی'], parking:['PARKING MEMORY','محل پارک'],
  dashcam:['DASHCAM','دوربین خودرو'],
};

function Gauge(props){
  var pct = props.value!=null ? Math.min(100,Math.max(0,((props.value-props.min)/(props.max-props.min))*100)) : 0;
  var r=46, circ=2*Math.PI*r, off=circ-(pct/100)*circ;
  return e('div',{className:'gauge-card'},
    SI(props.icon,18,props.color),
    e('span',{style:{fontSize:10,color:'#8892b0'}},props.label),
    e('div',{className:'gauge-ring'},
      e('svg',{viewBox:'0 0 120 120',width:'100%',height:'100%'},
        e('circle',{cx:60,cy:60,r:r,fill:'none',stroke:'#1d3557',strokeWidth:8}),
        e('circle',{cx:60,cy:60,r:r,fill:'none',stroke:props.color,strokeWidth:8,strokeLinecap:'round',
          strokeDasharray:circ,strokeDashoffset:off,
          style:{transition:'stroke-dashoffset .5s ease'}})
      ),
      e('div',{className:'gauge-value'},
        e('strong',null,props.value!=null?props.value:'--'),
        e('small',null,props.unit)
      )
    )
  );
}

function NavBtn(props){
  return e('button',{className:'nav-btn'+(props.active?' active':''),onClick:function(){props.onClick(props.id)}},
    SI(props.icon,17), props.label);
}

function SimplePage(title,body){
  return e('div',{className:'glass page-in',style:{textAlign:'center',padding:40}},
    e('h2',{style:{fontSize:18,fontWeight:700,marginBottom:12}},title),
    e('p',{style:{color:'#8892b0',fontSize:13}},body));
}

  var items = [
    {id:'dashboard',icon:IP.gauge,label:'داشبورد خودرو',desc:'نمایش زنده گیج‌ها و سنسورها',color:'#3b82f6'},

    {id:'errors',icon:IP.err,label:'خطا و پشتیبانی',desc:'کدهای خطا و گزارش',color:'#ef4444'},
    {id:'driving-style',icon:IP.style,label:'سبک رانندگی',desc:'امتیاز و تحلیل رانندگی',color:'#06b6d4'},
    {id:'parking',icon:IP.park,label:'محل پارک',desc:'ذخیره و پیدا کردن ماشین',color:'#f97316'},
    {id:'dashcam',icon:IP.cam,label:'دوربین خودرو',desc:'ضبط و پخش ویدئو',color:'#a855f7'},
    {id:'store',icon:IP.shop,label:'فروشگاه',desc:'خرید تجهیزات و اشتراک',color:'#fbbf24'},
    {id:'pro',icon:IP.crown,label:'نسخه Pro',desc:'امکانات پیشرفته',color:'#eab308'},
    {id:'settings',icon:IP.theme,label:'تنظیمات',desc:'تنظیمات اپ و اتصال',color:'#6b7280'},

          e('div',null,
            e('small',{style:{color:'#8892b0',fontSize:11,letterSpacing:2}},'SMART VEHICLE DIAGNOSTIC'),
            e('h2',{style:{fontSize:22,fontWeight:700,marginTop:4}},'ECU Pulse'),

          ),

            e('div',null,e('strong',{style:{display:'block',fontSize:22,fontFamily:'Courier New,monospace'}},'0'),e('small',{style:{color:'#8892b0',fontSize:10}},'km/h')),
            e('div',null,e('strong',{style:{display:'block',fontSize:22,fontFamily:'Courier New,monospace'}},'0'),e('small',{style:{color:'#8892b0',fontSize:10}},'RPM')),

function DashboardPage(){
  var _s=React.useState({rpm:800,speedKph:0,coolantC:82,voltage:13.8,engineLoad:22}),live=_s[0],setLive=_s[1];
  React.useEffect(function(){
    var t=setInterval(function(){setLive({
      rpm:Math.floor(600+Math.random()*2600), speedKph:Math.floor(Math.random()*120),
      coolantC:Math.floor(75+Math.random()*25), voltage:+(13.2+Math.random()*1.4).toFixed(1),
      engineLoad:Math.floor(15+Math.random()*70)
    })},1500);
    return function(){clearInterval(t)};
  },[]);
  var gauges=[
    {label:'دور موتور',value:live.rpm,unit:'RPM',min:0,max:8000,color:'#ef4444',icon:IP.gauge},
    {label:'سرعت',value:live.speedKph,unit:'km/h',min:0,max:240,color:'#3b82f6',icon:IP.speed},
    {label:'دمای موتور',value:live.coolantC,unit:'°C',min:60,max:120,color:'#f59e0b',icon:IP.temp},
    {label:'ولتاژ باتری',value:live.voltage,unit:'V',min:10,max:16,color:'#10b981',icon:IP.bolt},
    {label:'بار موتور',value:live.engineLoad,unit:'%',min:0,max:100,color:'#8b5cf6',icon:IP.eng},
  ];
  return e('div',{className:'page-in'},
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
      e('h2',{style:{fontSize:18,fontWeight:700}},'داشبورد زنده خودرو'),
      e('span',{className:'badge badge-green'},'حالت دمو')
    ),
    e('div',{className:'gauges-row'},
      gauges.map(function(g,i){return e(Gauge,Object.assign({},g,{key:i}))})
    )
  );
}

function ScannerPage(){
  var _s=React.useState([{dir:'info',text:'ECU Pulse ELM327 Console v1.0.0',time:Date.now()},{dir:'info',text:'حالت دمو — شبیه‌سازی ELM327',time:Date.now()}]),lines=_s[0],setLines=_s[1];
  var _i=React.useState(''),input=_i[0],setInput=_i[1];
  var _c=React.useState(false),conn=_c[0],setConn=_c[1];
  var botRef=React.useRef(null);
  var DEMO={'ATZ':'ELM327 v2.1','ATL0':'OK','ATH1':'OK','0100':'41 00 BE 1F B8 10','010C':'41 0C 1A F8','010D':'41 0D 30','0105':'41 0D 46','ATDPN':'6','ATI':'ELM327 v2.1','ATRV':'13.8V'};
  function send(cmd){
    var c=(cmd||input).trim().toUpperCase(); if(!c) return;
    setLines(function(p){return p.concat([{dir:'tx',text:'> '+c,time:Date.now()}])});
    setTimeout(function(){setLines(function(p){return p.concat([{dir:'rx',text:DEMO[c]||'?',time:Date.now()}])})},300);
    setInput('');
  }
  React.useEffect(function(){if(botRef.current) botRef.current.scrollIntoView({behavior:'smooth'})},[lines]);
  return e('div',{className:'page-in'},
    e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}},
      e('div',{style:{display:'flex',alignItems:'center',gap:10}},
        e('h2',{style:{fontSize:18,fontWeight:700}},'کنسول ECU'),
        e('span',{style:{width:8,height:8,borderRadius:'50%',background:conn?'#10b981':'#8892b0'}}),
        e('span',{style:{fontSize:12,color:'#8892b0'}},conn?'متصل':'قطع')
      ),
      e('div',{style:{display:'flex',gap:8}},
        e('button',{className:'btn-ghost',style:{fontSize:11},onClick:function(){setLines([{dir:'info',text:'console cleared',time:Date.now()}])}},'پاک کردن'),
        e('button',{className:conn?'btn-ghost':'btn-primary',style:{fontSize:11},onClick:function(){var nc=!conn;setConn(nc);setLines(function(p){return p.concat([{dir:'info',text:nc?'اتصال به ELM327...':'قطع ارتباط',time:Date.now()},{dir:'info',text:nc?'متصل — حالت دمو':'آفلاین',time:Date.now()}])})}},conn?'قطع':'اتصال')
      )
    ),
    e('div',{className:'terminal'},
      lines.map(function(l,i){return e('div',{key:i,className:l.dir,style:{lineHeight:1.6}},l.text)}),
      e('div',{ref:botRef})
    ),
    e('div',{style:{display:'flex',gap:8,marginTop:10,flexWrap:'wrap'}},
      ['ATZ','010C','010D','0105','ATDPN','ATRV'].map(function(c){return e('button',{key:c,className:'qcmd',onClick:function(){send(c)}},c)})
    ),
    e('div',{style:{display:'flex',gap:8,marginTop:8}},
      e('input',{value:input,onChange:function(ev){setInput(ev.target.value)},onKeyDown:function(ev){if(ev.key==='Enter') send()},
        className:'input-field',placeholder:'دستور AT / OBD ...'}),
      e('button',{className:'btn-primary',style:{padding:'8px 16px'},onClick:function(){send()}},'ارسال')
    )
  );
}

function AnalysisPage(){
  var _r=React.useState(false),ran=_r[0],setRan=_r[1];
  var items=[
