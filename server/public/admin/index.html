<!doctype html><html lang="fa" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>ECU Pulse Admin</title><link rel="stylesheet" href="styles.css"></head><body>
<main><section id="login" class="card login"><h1>پنل مدیریت ECU Pulse</h1><p>مدیریت API، آفر، تخفیف، دسترسی و گزارش خطا</p><input id="password" type="password" placeholder="رمز ادمین"><button id="loginBtn">ورود امن</button><small>رمز پیش‌فرض توسعه را قبل از انتشار تغییر بده.</small></section>
<section id="panel" hidden><header><div><small>DIAGEMAN.IR / API 4030</small><h1>مرکز مدیریت</h1></div><button id="refreshBtn">بروزرسانی</button></header>
<div class="stats" id="stats"></div><nav><button data-tab="offers" class="active">آفرها</button><button data-tab="coupons">کدهای تخفیف</button><button data-tab="clients">کلاینت‌های API</button><button data-tab="entitlements">لایسنس‌ها</button><button data-tab="errors">گزارش خطا</button></nav>
<section class="card"><div class="toolbar"><strong id="tabTitle"></strong><button id="saveBtn">ذخیره JSON</button></div><textarea id="editor" spellcheck="false"></textarea><div id="errorCards"></div></section></section></main><div id="toast"></div><script src="app.js"></script></body></html>
