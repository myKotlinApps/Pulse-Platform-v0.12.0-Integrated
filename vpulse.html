<style>
*{margin:0;padding:0;box-sizing:border-box}
html{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;scroll-behavior:smooth}
body{background:#e8ecf1;color:#1a1a2e;min-height:100dvh;overflow-x:hidden}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit;color:inherit}
input,select{outline:none;border:1px solid #d1d5db;border-radius:10px;padding:9px 12px;font-family:inherit;font-size:13px;color:#1a1a2e;background:#fff;width:100%}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
#root{max-width:430px;margin:0 auto;min-height:100dvh;display:flex;flex-direction:column;background:#fff;box-shadow:0 0 30px rgba(0,0,0,.06);position:relative}

/* Header */
.app-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#fff;border-bottom:1px solid #f0f0f0;position:sticky;top:0;z-index:30}
.app-hdr .hamburger{font-size:20px;color:#555;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.app-hdr .logo{font-size:17px;font-weight:800;color:#2563eb;letter-spacing:-.5px}
.app-hdr .conn-btn{padding:7px 16px;border-radius:18px;font-size:11px;font-weight:700;background:#e8f0fe;color:#2563eb;transition:all .15s}
.app-hdr .conn-btn.on{background:#2563eb;color:#fff}

/* Vehicle Card */
.vcard{background:#f8fafc;border-radius:16px;margin:12px 14px;padding:16px;display:flex;flex-direction:column;gap:12px}
.vcard-top{display:flex;align-items:center;gap:10px}
.vcard-top .vlogo{width:40px;height:40px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.vcard-top strong{font-size:15px;font-weight:700}
.vcard-stats{display:flex;justify-content:space-between}
.vcard-stats div{text-align:center;flex:1}
.vcard-stats .lbl{font-size:9px;color:#888;display:block;margin-bottom:3px}
.vcard-stats .val{font-size:14px;font-weight:700;color:#1a1a2e}
.vcard-stats .warn{color:#d97706}

/* Section */
.sec{padding:16px 16px 8px;font-size:12px;font-weight:700;color:#555;letter-spacing:.3px;display:flex;align-items:center;gap:6px}
.sec::after{content:'';flex:1;height:1px;background:#eee}

/* Grid */
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 14px}
.g3{background:#fff;border:1px solid #f0f0f0;border-radius:14px;padding:18px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;transition:all .15s;box-shadow:0 1px 2px rgba(0,0,0,.02)}
.g3:active{background:#f8fafc;transform:scale(.96)}
.g3 .ico{font-size:26px;color:#2563eb;opacity:.8}
.g3 strong{font-size:11px;font-weight:600;color:#333}
.g3 small{font-size:9px;color:#999}

/* Grid 2 */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 14px}
.g2{background:#fff;border:1px solid #f0f0f0;border-radius:14px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:6px;text-align:center;box-shadow:0 1px 2px rgba(0,0,0,.02)}
.g2:active{background:#f8fafc}
.g2 .ico{font-size:30px}
.g2 strong{font-size:12px;font-weight:600}
.g2 .lv{font-size:22px;font-weight:800;color:#2563eb;font-family:'SF Mono',monospace}
.g2 .lu{font-size:10px;color:#888}

/* DTC Card */
.dc0{background:#fff;border:1px solid #f0f0f0;border-radius:14px;margin:0 14px 8px;padding:14px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 2px rgba(0,0,0,.02)}
.dc0 .di0{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.dc0 .db0{flex:1;min-width:0}
.dc0 .db0 strong{font-size:13px;font-weight:600}
.dc0 .db0 p{font-size:10px;color:#888;margin-top:2px}
.dc0 .dbdg0{padding:3px 8px;border-radius:8px;font-size:8px;font-weight:700;letter-spacing:.3px}

/* Terminal */
.term0{background:#1a1f2e;border-radius:14px;margin:0 14px;overflow:hidden}
.term0 .th0{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.06);font-size:10px;color:#8892b0;display:flex;align-items:center;gap:6px}
.term0 .th0 .dot0{width:6px;height:6px;border-radius:50%}
.term0 .tb0{height:180px;overflow-y:auto;padding:10px 14px;font-family:'SF Mono',monospace;font-size:10px;line-height:1.8;color:#cbd5e1}
.term0 .tb0 .tx0{color:#60a5fa}
.term0 .tb0 .rx0{color:#4ade80}
.term0 .tb0 .inf0{color:#64748b}
.term0 .tr0{display:flex;border-top:1px solid rgba(255,255,255,.06)}
.term0 .tr0 input{flex:1;padding:10px 14px;background:transparent;font-family:'SF Mono',monospace;font-size:11px;color:#f1f5f9;border:none;border-radius:0}
.term0 .tr0 button{padding:10px 16px;background:#2563eb;color:#fff;font-weight:700;font-size:11px;border-radius:0}

/* Chips */
.ch0{display:flex;gap:5px;flex-wrap:wrap;padding:0 14px;margin:8px 0}
.cp0{padding:5px 12px;border-radius:14px;border:1px solid #e5e7eb;font-size:10px;font-family:'SF Mono',monospace;color:#666;background:#fff;transition:all .15s}
.cp0:hover,.cp0.sel{border-color:#2563eb;color:#2563eb}

.br-chips{display:flex;flex-wrap:wrap;gap:5px;padding:0 14px}
.br-c{padding:7px 12px;border-radius:16px;border:1px solid #e5e7eb;font-size:10px;font-weight:600;background:#fff;color:#555}
.br-c.sel{border-color:#2563eb;color:#2563eb;background:#e8f0fe}
.br-c:active{background:#e8f0fe}

.map0{height:220px;border-radius:14px;overflow:hidden;margin:0 14px;border:1px solid #eee}

.srb0 svg{transform:rotate(-135deg)}
.sbc0{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.sbc0 .bv0{font-size:44px;font-weight:800;letter-spacing:-3px}
.sbc0 .bl0{font-size:11px;color:#888;margin-top:4px}

.sd2{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 14px}
.si2{padding:12px;background:#fff;border:1px solid #f0f0f0;border-radius:12px;display:flex;flex-direction:column;gap:4px}
.si2 .sl2{font-size:9px;color:#888;font-weight:600}
.si2 .sv2{font-size:17px;font-weight:700}
.si2 .sb2{height:3px;border-radius:2px;background:#eee;overflow:hidden;margin-top:3px}
.si2 .sb2 div{height:100%;border-radius:2px}

/* List */
.lst{display:flex;flex-direction:column;gap:6px;padding:0 14px}
.lr{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:#fff;border:1px solid #f0f0f0;border-radius:12px}
.lr strong{font-size:12px;font-weight:600}
.lr span{font-size:13px;font-weight:700;color:#2563eb}

/* Offer */
.ofr{padding:14px;background:#fff;border:1px solid #f0f0f0;border-radius:12px;display:flex;flex-direction:column;gap:6px;text-align:center}
.ofr strong{font-size:13px;font-weight:600}
.ofr .pr{font-size:18px;font-weight:800;color:#2563eb}
.ofr small{font-size:9px;color:#888}

.bnav0{display:flex;justify-content:space-around;padding:8px 10px 16px;background:#10151f;position:sticky;bottom:0;z-index:30}
.bnav0 button{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 16px;border-radius:10px;color:#667;font-size:9px;font-weight:700;letter-spacing:.3px;transition:all .15s}
.bnav0 button svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2}
.bnav0 button.on{color:#60a5fa}
.bnav0 button.on svg{fill:rgba(96,165,250,.12);stroke:#60a5fa}

.scroll{flex:1;overflow-y:auto;padding-bottom:12px}

.sr0{padding:13px 16px;background:#fff;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between}

.sr0:last-child{border-radius:0 0 14px 14px;border-bottom:none}
.sr0:only-child{border-radius:14px}
.sr0 .sl0 strong{font-size:12px;font-weight:600;display:block}
.sr0 .sl0 small{font-size:9px;color:#888;display:block;margin-top:2px}
.sw0{width:42px;height:24px;border-radius:12px;background:#d1d5db;position:relative;transition:all .2s}
.sw0.on{background:#2563eb}
.sw0::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.12);transition:all .2s}
.sw0.on::after{left:20px}

.btn1{padding:10px 20px;border-radius:20px;font-weight:700;font-size:12px;letter-spacing:.3px;text-align:center;width:100%}
.btn1.blue{background:#2563eb;color:#fff;box-shadow:0 2px 8px rgba(37,99,235,.2)}

.btn1.out{border:1.5px solid #e5e7eb;color:#555;background:#fff}

.tip strong{color:#333;display:block;margin-bottom:4px;font-size:12px}
.badge0{padding:3px 8px;border-radius:8px;font-size:9px;font-weight:700}
.pending{background:#fef3c7;color:#d97706}
.confirmed{background:#fef2f2;color:#dc2626}
.ok{background:#dcfce7;color:#16a34a}
.info{background:#e8f0fe;color:#2563eb}
.row2{display:flex;gap:8px;padding:0 14px;margin:8px 0}
.row2 input{flex:1}
.row2 button{padding:10px 16px;border-radius:10px;font-weight:700;font-size:12px;flex-shrink:0;background:#2563eb;color:#fff}
.scn-tabs{display:flex;gap:4px;padding:0 14px;margin:8px 0}
.scn-tb{padding:6px 12px;border-radius:14px;font-size:10px;font-weight:700;border:1px solid #e5e7eb;background:#fff;color:#666;transition:all .15s}
.scn-tb.on{background:#2563eb;color:#fff;border-color:#2563eb}
.empt{text-align:center;padding:30px 20px;color:#888}
.empt .emj{font-size:40px;margin-bottom:8px}
.empt p{font-size:12px}
</style>
